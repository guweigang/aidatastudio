name: Build AIData Studio

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "CNB source branch, tag, or commit to build"
        required: true
        default: "main"
      platform:
        description: "Platform to build"
        required: true
        default: "macos"
        type: choice
        options:
          - macos
          - windows
          - all
      release_mode:
        description: "macOS release mode"
        required: true
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - signed
          - signed-skip-stapling
      target_mode:
        description: "macOS target mode"
        required: true
        default: "apple-silicon"
        type: choice
        options:
          - host
          - apple-silicon
          - intel
          - both
          - universal
      publish_github_release:
        description: "Publish artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: aidatastudio-build-${{ github.event.inputs.source_ref }}-${{ github.event.inputs.platform }}-${{ github.event.inputs.target_mode }}
  cancel-in-progress: false

env:
  SOURCE_DIR: source
  VJSX_DIR: vjsx
  QUICKJS_DIR: quickjs
  CNB_SOURCE_REPO: ${{ vars.CNB_SOURCE_REPO || 'https://cnb.cool/bullsoft/vtable.git' }}
  VJSX_REPO: ${{ vars.VJSX_REPO || 'https://github.com/guweigang/vjsx.git' }}
  QUICKJS_REPO: ${{ vars.QUICKJS_REPO || 'https://github.com/bellard/quickjs.git' }}
  VCPKG_BINARY_CACHE_DIR: ${{ github.workspace }}\.cache\vcpkg-binary-cache
  VTABLE_SIDECAR_V_FLAGS: ${{ vars.VTABLE_SIDECAR_V_FLAGS || '-cc clang -show-c-output -d build_quickjs -d use_openssl' }}
  VTABLE_WINDOWS_SIDECAR_V_FLAGS: ${{ vars.VTABLE_WINDOWS_SIDECAR_V_FLAGS || '-cc msvc -show-c-output -d build_quickjs -d quickjs_ng' }}

jobs:
  macos:
    name: macOS DMG (${{ matrix.target_mode }})
    if: inputs.platform == 'macos' || inputs.platform == 'all'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.target_mode == 'both' && '[{"target_mode":"apple-silicon","runner":"macos-14"},{"target_mode":"intel","runner":"macos-15-intel"}]' || inputs.target_mode == 'intel' && '[{"target_mode":"intel","runner":"macos-15-intel"}]' || inputs.target_mode == 'universal' && '[{"target_mode":"universal","runner":"macos-14"}]' || inputs.target_mode == 'host' && '[{"target_mode":"host","runner":"macos-14"}]' || '[{"target_mode":"apple-silicon","runner":"macos-14"}]') }}

    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Prepare CNB authentication
        env:
          CNB_ACCESS_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}
        run: |
          set -eu
          if [ -n "${CNB_ACCESS_TOKEN}" ]; then
            git config --global url."https://cnb:${CNB_ACCESS_TOKEN}@cnb.cool/".insteadOf "https://cnb.cool/"
          fi

      - name: Clone source from CNB
        run: |
          set -eu
          git clone --depth 1 --branch "${{ inputs.source_ref }}" "${CNB_SOURCE_REPO}" "${SOURCE_DIR}" || {
            git clone "${CNB_SOURCE_REPO}" "${SOURCE_DIR}"
            cd "${SOURCE_DIR}"
            git checkout "${{ inputs.source_ref }}"
          }

      - name: Clone vjsx from CNB
        run: |
          set -eu
          git clone --depth 1 "${VJSX_REPO}" "${VJSX_DIR}"

      - name: Clone QuickJS
        run: |
          set -eu
          git clone --depth 1 "${QUICKJS_REPO}" "${QUICKJS_DIR}"

      - name: Install system dependencies
        run: |
          set -eu
          brew update
          brew install bdw-gc libpq mysql-client openssl@3 pkg-config sqlite
          mysql_prefix="$(brew --prefix mysql-client)"
          libpq_prefix="$(brew --prefix libpq)"
          openssl_prefix="$(brew --prefix openssl@3)"
          gc_prefix="$(brew --prefix bdw-gc)"
          sqlite_prefix="$(brew --prefix sqlite)"
          {
            echo "${mysql_prefix}/bin"
            echo "${libpq_prefix}/bin"
            echo "${openssl_prefix}/bin"
            echo "${sqlite_prefix}/bin"
          } >> "${GITHUB_PATH}"
          {
            echo "PKG_CONFIG_PATH=${mysql_prefix}/lib/pkgconfig:${libpq_prefix}/lib/pkgconfig:${openssl_prefix}/lib/pkgconfig:${gc_prefix}/lib/pkgconfig:${sqlite_prefix}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "CPPFLAGS=-I${mysql_prefix}/include/mysql -I${libpq_prefix}/include -I${openssl_prefix}/include -I${gc_prefix}/include -I${sqlite_prefix}/include ${CPPFLAGS:-}"
            echo "LDFLAGS=-L${mysql_prefix}/lib -L${libpq_prefix}/lib -L${openssl_prefix}/lib -L${gc_prefix}/lib -L${sqlite_prefix}/lib ${LDFLAGS:-}"
            echo "OPENSSL_ROOT_DIR=${openssl_prefix}"
            echo "POSTGRES_ROOT=${libpq_prefix}"
          } >> "${GITHUB_ENV}"

      - name: Install V
        run: |
          set -eu
          git clone --depth 1 https://github.com/vlang/v.git "${RUNNER_TEMP}/v"
          if ! make -C "${RUNNER_TEMP}/v"; then
            echo "V make failed after bootstrap; checking whether the compiler binary was produced" >&2
            test -x "${RUNNER_TEMP}/v/v"
          fi
          "${RUNNER_TEMP}/v/v" -version
          echo "${RUNNER_TEMP}/v" >> "${GITHUB_PATH}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache macOS Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/desktop/src-tauri/target
          key: macos-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target_mode }}-cargo-${{ hashFiles('source/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target_mode }}-cargo-
            macos-${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: source/desktop
        run: npm ci

      - name: Install Tauri CLI
        run: |
          set -eu
          mkdir -p "${RUNNER_TEMP}/tauri-cli-bin"
          cat > "${RUNNER_TEMP}/tauri-cli-bin/cargo-tauri" <<'EOF'
          #!/bin/sh
          if [ "${1:-}" = "tauri" ]; then
            shift
          fi
          exec npm exec --yes --package @tauri-apps/cli@^2 -- tauri "$@"
          EOF
          chmod +x "${RUNNER_TEMP}/tauri-cli-bin/cargo-tauri"
          echo "${RUNNER_TEMP}/tauri-cli-bin" >> "${GITHUB_PATH}"
          PATH="${RUNNER_TEMP}/tauri-cli-bin:${PATH}" cargo tauri --version

      - name: Check desktop and Tauri build inputs
        working-directory: source
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}/${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}/${{ env.QUICKJS_DIR }}
        run: |
          set -eu
          npm --prefix desktop run check
          npm --prefix desktop run sidecar:prepare
          npm --prefix desktop run build
          cargo check --manifest-path desktop/src-tauri/Cargo.toml

      - name: Build macOS release
        working-directory: source
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}/${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}/${{ env.QUICKJS_DIR }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          set -eu
          case "${{ inputs.release_mode }}:${{ matrix.target_mode }}" in
            unsigned:host|unsigned:apple-silicon|unsigned:intel)
              npm --prefix desktop run release:macos
              ;;
            unsigned:universal)
              npm --prefix desktop run release:macos:universal
              ;;
            signed:host|signed:apple-silicon|signed:intel)
              npm --prefix desktop run release:macos:signed
              ;;
            signed-skip-stapling:host|signed-skip-stapling:apple-silicon|signed-skip-stapling:intel)
              npm --prefix desktop run release:macos:signed:skip-stapling
              ;;
            *)
              echo "unsupported release/target combination: ${{ inputs.release_mode }}:${{ matrix.target_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Read release metadata
        id: release_meta
        run: |
          set -eu
          version="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.version)")"
          artifact="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.artifact)")"
          arch="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.arch)")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "arch=${arch}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aidatastudio-macos-${{ inputs.source_ref }}-${{ inputs.release_mode }}-${{ steps.release_meta.outputs.arch }}
          path: dist/macos/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: inputs.publish_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: AIData Studio ${{ steps.release_meta.outputs.version }}
          body_path: dist/macos/RELEASE_NOTES.md
          files: |
            dist/macos/${{ steps.release_meta.outputs.artifact }}
            dist/macos/sha256sums.txt
            dist/macos/release.json
          fail_on_unmatched_files: true

  windows:
    name: Windows package (x64)
    if: inputs.platform == 'windows' || inputs.platform == 'all'
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Prepare CNB authentication
        shell: pwsh
        env:
          CNB_ACCESS_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}
        run: |
          if ($env:CNB_ACCESS_TOKEN) {
            git config --global url."https://cnb:$env:CNB_ACCESS_TOKEN@cnb.cool/".insteadOf "https://cnb.cool/"
          }

      - name: Clone source from CNB
        shell: pwsh
        run: |
          git clone --depth 1 --branch "${{ inputs.source_ref }}" "$env:CNB_SOURCE_REPO" "$env:SOURCE_DIR"
          if ($LASTEXITCODE -ne 0) {
            git clone "$env:CNB_SOURCE_REPO" "$env:SOURCE_DIR"
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Push-Location "$env:SOURCE_DIR"
            git checkout "${{ inputs.source_ref }}"
            $code = $LASTEXITCODE
            Pop-Location
            if ($code -ne 0) { exit $code }
          }

      - name: Clone vjsx
        shell: pwsh
        run: git clone --depth 1 "$env:VJSX_REPO" "$env:VJSX_DIR"

      - name: Clone QuickJS
        shell: pwsh
        env:
          QUICKJS_WINDOWS_REPO: ${{ vars.QUICKJS_WINDOWS_REPO || 'https://github.com/quickjs-ng/quickjs.git' }}
        run: git clone --depth 1 "$env:QUICKJS_WINDOWS_REPO" "$env:QUICKJS_DIR"

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/desktop/package-lock.json

      - name: Cache Windows vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: .cache/vcpkg-binary-cache
          key: windows-vcpkg-x64-windows-msvc-v1-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: |
            windows-vcpkg-x64-windows-msvc-v1-

      - name: Cache Windows Cargo tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri.exe
            ~/.cargo/registry
            ~/.cargo/git
          key: windows-cargo-tools-v1-${{ hashFiles('source/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-tools-v1-

      - name: Cache Windows Tauri target
        uses: actions/cache@v4
        with:
          path: source/desktop/src-tauri/target
          key: windows-tauri-target-v1-${{ hashFiles('source/desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-tauri-target-v1-

      - name: Setup V on Windows
        shell: pwsh
        run: |
          $installRoot = Join-Path $env:RUNNER_TEMP "vlang"
          if (Test-Path $installRoot) {
            Remove-Item -Recurse -Force $installRoot
          }
          git clone --depth 1 https://github.com/vlang/v.git $installRoot
          Push-Location $installRoot
          cmd /c makev.bat -msvc
          $vBuildExitCode = $LASTEXITCODE
          Pop-Location
          if ($vBuildExitCode -ne 0) { exit $vBuildExitCode }
          $sqliteSource = Join-Path $installRoot "thirdparty\sqlite\sqlite3.cpp"
          if (!(Test-Path $sqliteSource)) {
            Push-Location $installRoot
            & (Join-Path $installRoot "v.exe") run "vlib\db\sqlite\install_thirdparty_sqlite.vsh"
            $sqliteInstallExitCode = $LASTEXITCODE
            Pop-Location
            if ($sqliteInstallExitCode -ne 0) { exit $sqliteInstallExitCode }
            $sqliteCSource = Join-Path $installRoot "thirdparty\sqlite\sqlite3.c"
            if (Test-Path $sqliteCSource) {
              Copy-Item -Force $sqliteCSource $sqliteSource
            } elseif (!(Test-Path $sqliteSource)) {
              throw "V thirdparty sqlite source not found at $sqliteSource"
            }
          }
          Add-Content -Path $env:GITHUB_PATH -Value $installRoot
          & (Join-Path $installRoot "v.exe") version
          git -C $installRoot log -1 --oneline

      - name: Install Windows native dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_BINARY_CACHE_DIR" | Out-Null
          $env:VCPKG_DEFAULT_BINARY_CACHE = "$env:VCPKG_BINARY_CACHE_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_DEFAULT_BINARY_CACHE=$env:VCPKG_BINARY_CACHE_DIR"
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          & (Join-Path $vcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $triplet = "x64-windows"
          & (Join-Path $vcpkgRoot "vcpkg.exe") install openssl:$triplet libmariadb:$triplet libpq:$triplet bdwgc:$triplet
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $sdkRoot = Join-Path $vcpkgRoot "installed\$triplet"
          $vRoot = Join-Path $env:RUNNER_TEMP "vlang"
          $vMysqlRoot = Join-Path $vRoot "thirdparty\mysql"
          $vMysqlInclude = Join-Path $vMysqlRoot "include"
          $vMysqlLib = Join-Path $vMysqlRoot "lib"
          $vPgRoot = Join-Path $vRoot "thirdparty\pg"
          $vPgInclude = Join-Path $vPgRoot "libpq"
          $vPgLib = Join-Path $vPgRoot "win64"
          New-Item -ItemType Directory -Force -Path $vMysqlInclude, $vMysqlLib, $vPgInclude, $vPgLib | Out-Null
          $mysqlHeader = Get-ChildItem -Path $sdkRoot -Filter mysql.h -File -Recurse | Select-Object -First 1
          $mysqlImportLib = Get-ChildItem -Path (Join-Path $sdkRoot "lib") -Include libmariadb.lib, mysqlclient.lib, libmysql.lib, mysql.lib -File -Recurse | Select-Object -First 1
          $mysqlRuntimeDll = Get-ChildItem -Path $sdkRoot -Include libmariadb.dll, libmysql.dll -File -Recurse | Select-Object -First 1
          $pgHeader = Get-ChildItem -Path $sdkRoot -Filter libpq-fe.h -File -Recurse | Select-Object -First 1
          $pgConfigHeader = Get-ChildItem -Path $sdkRoot -Filter pg_config.h -File -Recurse | Select-Object -First 1
          $pgImportLib = Get-ChildItem -Path (Join-Path $sdkRoot "lib") -Include libpq.lib, pq.lib -File -Recurse | Select-Object -First 1
          $pgRuntimeDll = Get-ChildItem -Path $sdkRoot -Include libpq.dll -File -Recurse | Select-Object -First 1
          $opensslLibDir = Join-Path $sdkRoot "lib"
          $cryptoImportLib = Get-ChildItem -Path $opensslLibDir -Include libcrypto.lib, crypto.lib -File -Recurse | Select-Object -First 1
          $sslImportLib = Get-ChildItem -Path $opensslLibDir -Include libssl.lib, ssl.lib -File -Recurse | Select-Object -First 1
          if ($null -eq $mysqlHeader) { throw "mysql.h not found under $sdkRoot" }
          if ($null -eq $mysqlImportLib) { throw "MariaDB/MySQL import library not found under $sdkRoot" }
          if ($null -eq $pgHeader) { throw "libpq-fe.h not found under $sdkRoot" }
          if ($null -eq $pgConfigHeader) { throw "pg_config.h not found under $sdkRoot" }
          if ($null -eq $pgImportLib) { throw "PostgreSQL libpq import library not found under $sdkRoot" }
          if ($null -eq $cryptoImportLib) { throw "OpenSSL crypto import library not found under $sdkRoot" }
          if ($null -eq $sslImportLib) { throw "OpenSSL ssl import library not found under $sdkRoot" }
          $mysqlCdefs = Join-Path $vRoot "vlib\db\mysql\_cdefs_windows.c.v"
          Set-Content -Encoding utf8 -Path $mysqlCdefs -Value @'
          module mysql

          #flag windows -I@VEXEROOT/thirdparty/mysql/include
          #flag windows -L@VEXEROOT/thirdparty/mysql/lib
          #flag windows -lmysql

          #include <mysql.h> # Please install https://dev.mysql.com/downloads/installer/ , then copy the include, lib, and bin folders to thirdparty/mysql. Make sure thirdparty/mysql/bin and thirdparty/mysql/lib are on PATH, or copy libmysql.dll next to the produced .exe
          '@
          Copy-Item -Recurse -Force (Join-Path $mysqlHeader.DirectoryName "*") $vMysqlInclude
          Copy-Item -Force $mysqlImportLib.FullName (Join-Path $vMysqlLib "mysql.lib")
          Copy-Item -Force $mysqlImportLib.FullName (Join-Path $vMysqlLib "libmysql.lib")
          Copy-Item -Force $mysqlImportLib.FullName (Join-Path $vMysqlLib "libmariadb.lib")
          if ($null -ne $mysqlRuntimeDll) {
            Copy-Item -Force $mysqlRuntimeDll.FullName (Join-Path $vMysqlLib "libmysql.dll")
          }
          Copy-Item -Recurse -Force (Join-Path $pgHeader.DirectoryName "*") $vPgInclude
          Copy-Item -Force $pgConfigHeader.FullName (Join-Path $vPgInclude "pg_config.h")
          Copy-Item -Force $pgImportLib.FullName (Join-Path $vPgLib "libpq.lib")
          Copy-Item -Force $pgImportLib.FullName (Join-Path $vPgLib "pq.lib")
          if ($null -ne $pgRuntimeDll) {
            Copy-Item -Force $pgRuntimeDll.FullName (Join-Path $vPgLib "libpq.dll")
          }
          foreach ($alias in @("crypto.lib", "libcrypto.lib")) {
            $aliasPath = Join-Path $opensslLibDir $alias
            if ($cryptoImportLib.FullName -ne $aliasPath) {
              Copy-Item -Force $cryptoImportLib.FullName $aliasPath
            }
          }
          foreach ($alias in @("ssl.lib", "libssl.lib")) {
            $aliasPath = Join-Path $opensslLibDir $alias
            if ($sslImportLib.FullName -ne $aliasPath) {
              Copy-Item -Force $sslImportLib.FullName $aliasPath
            }
          }
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_ROOT_DIR=$sdkRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "MYSQL_ROOT=$sdkRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "POSTGRES_ROOT=$sdkRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_INSTALLED_DIR=$sdkRoot"
          Add-Content -Path $env:GITHUB_ENV -Value "C_INCLUDE_PATH=$sdkRoot\include;$env:C_INCLUDE_PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "LIBRARY_PATH=$sdkRoot\lib;$env:LIBRARY_PATH"
          Add-Content -Path $env:GITHUB_ENV -Value "PKG_CONFIG_PATH=$sdkRoot\lib\pkgconfig;$sdkRoot\share\pkgconfig;$env:PKG_CONFIG_PATH"
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $sdkRoot "bin")

      - name: Install desktop dependencies
        working-directory: source/desktop
        shell: pwsh
        run: npm ci

      - name: Prepare Windows sidecar
        working-directory: source
        shell: pwsh
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}\${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}\${{ env.QUICKJS_DIR }}
          VTABLE_SIDECAR_V_FLAGS: ${{ env.VTABLE_WINDOWS_SIDECAR_V_FLAGS }}
        run: |
          $ErrorActionPreference = "Stop"
          $moduleRoot = Join-Path $env:RUNNER_TEMP "vtable-vmodules-windows"
          $outputDir = "backend\bin"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          $outputDir = Resolve-Path $outputDir
          $sidecar = Join-Path $outputDir "vtable-sidecar.exe"
          $targetSidecar = Join-Path $outputDir "vtable-sidecar-x86_64-pc-windows-msvc.exe"
          if (Test-Path $moduleRoot) {
            Remove-Item -Recurse -Force $moduleRoot
          }
          New-Item -ItemType Directory -Force -Path $moduleRoot | Out-Null
          Copy-Item -Recurse -Force $env:VTABLE_VJSX_PATH (Join-Path $moduleRoot "vjsx")
          Copy-Item -Recurse -Force (Join-Path $env:VTABLE_VJSX_PATH "runtimejs") (Join-Path $moduleRoot "runtimejs")
          $env:VMODULES = $moduleRoot
          $flags = $env:VTABLE_SIDECAR_V_FLAGS -split '\s+' | Where-Object { $_ }
          $mysqlImportLib = Get-ChildItem -Path (Join-Path $env:MYSQL_ROOT "lib") -Include libmariadb.lib, mysqlclient.lib, libmysql.lib, mysql.lib -File -Recurse | Select-Object -First 1
          $pgImportLib = Get-ChildItem -Path (Join-Path $env:POSTGRES_ROOT "lib") -Include libpq.lib, pq.lib -File -Recurse | Select-Object -First 1
          if ($null -eq $mysqlImportLib) { throw "MariaDB/MySQL import library not found under $env:MYSQL_ROOT" }
          if ($null -eq $pgImportLib) { throw "PostgreSQL libpq import library not found under $env:POSTGRES_ROOT" }
          $flags += @("-showcc")
          & v @flags -o $sidecar "backend\cmd\vtable_sidecar"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if (!(Test-Path $sidecar)) { throw "sidecar build did not produce $sidecar" }
          Copy-Item -Force $sidecar $targetSidecar
          Get-ChildItem -Path $outputDir -Filter "vtable-sidecar*.exe" | Sort-Object Name | ForEach-Object {
            Write-Host "prepared $($_.FullName)"
          }

      - name: Check desktop and Tauri build inputs
        working-directory: source
        shell: pwsh
        run: |
          npm --prefix desktop run check
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm --prefix desktop run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo check --manifest-path desktop/src-tauri/Cargo.toml --target x86_64-pc-windows-msvc
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Install Tauri CLI
        shell: pwsh
        run: |
          if (Get-Command cargo-tauri -ErrorAction SilentlyContinue) {
            cargo tauri --version
          } else {
            cargo install tauri-cli --version "^2" --locked
          }

      - name: Stage sidecar runtime DLLs
        working-directory: source
        shell: pwsh
        run: |
          $sidecarDir = Resolve-Path "backend\bin"
          $runtimeDir = Join-Path $sidecarDir "runtime\libs"
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          function Copy-DependencyDll([System.IO.FileInfo]$dll) {
            $sidecarTarget = Join-Path $sidecarDir $dll.Name
            $runtimeTarget = Join-Path $runtimeDir $dll.Name
            Copy-Item -Force $dll.FullName $sidecarTarget
            Copy-Item -Force $dll.FullName $runtimeTarget
          }

          $vcpkgBin = Join-Path $env:VCPKG_INSTALLED_DIR "bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem -Path $vcpkgBin -Filter "*.dll" -File | ForEach-Object {
              Copy-DependencyDll $_
            }
          }

          if ($env:VCToolsRedistDir -and (Test-Path $env:VCToolsRedistDir)) {
            Get-ChildItem -Path $env:VCToolsRedistDir -Filter "*.dll" -File -Recurse |
              Where-Object { $_.FullName -match "\\x64\\Microsoft\.VC\d+\.CRT\\" } |
              ForEach-Object {
                Copy-DependencyDll $_
              }
          }
          Get-ChildItem -Path $sidecarDir -File | Sort-Object Name | ForEach-Object { Write-Host "staged $($_.Name)" }

      - name: Inspect Windows sidecar dependencies
        working-directory: source
        shell: pwsh
        run: |
          if (Get-Command dumpbin -ErrorAction SilentlyContinue) {
            dumpbin /DEPENDENTS "backend\bin\vtable-sidecar.exe"
            Get-ChildItem -Path "backend\bin" -Filter "*.dll" -File | Sort-Object Name | ForEach-Object {
              Write-Host "DEPENDENTS $($_.Name)"
              dumpbin /DEPENDENTS $_.FullName
            }
          } else {
            Write-Warning "dumpbin not found; skipping dependency inspection"
          }

      - name: Doctor Windows sidecar runtime
        working-directory: source
        shell: pwsh
        run: |
          $doctorScript = "desktop\scripts\doctor-runtime-libs.ps1"
          $doctorArgs = @()
          if ($env:VTABLE_WINDOWS_SIDECAR_V_FLAGS -match "-cc\s+gcc") {
            $doctorArgs += "-RequireMinGWRuntime"
          }
          & $doctorScript -SidecarPath "backend\bin\vtable-sidecar.exe" @doctorArgs

      - name: Prepare Windows Tauri icon
        working-directory: source
        shell: pwsh
        run: |
          $iconDir = "desktop\src-tauri\icons"
          $icoPath = Join-Path $iconDir "icon.ico"
          if (!(Test-Path $icoPath)) {
            $sourceIcon = Join-Path $iconDir "128x128@2x.png"
            if (!(Test-Path $sourceIcon)) {
              $sourceIcon = Join-Path $iconDir "128x128.png"
            }
            if (!(Test-Path $sourceIcon)) {
              throw "Tauri Windows icon source not found under $iconDir"
            }
            magick $sourceIcon -define icon:auto-resize=256,128,64,48,32,16 $icoPath
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }
          if (!(Test-Path $icoPath)) {
            throw "Tauri Windows icon was not prepared at $icoPath"
          }
          Write-Host "prepared $icoPath"

      - name: Build Windows package
        working-directory: source
        shell: pwsh
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}\${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}\${{ env.QUICKJS_DIR }}
          VTABLE_SIDECAR_V_FLAGS: ${{ env.VTABLE_WINDOWS_SIDECAR_V_FLAGS }}
        run: |
          npm --prefix desktop run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          cargo tauri build --target x86_64-pc-windows-msvc --no-sign --config '{"bundle":{"icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"],"resources":["../../backend/bin/*.dll","../../backend/bin/runtime"]}}'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Collect Windows artifacts
        shell: pwsh
        run: |
          $dist = Join-Path $env:GITHUB_WORKSPACE "dist\windows"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          $bundleRoot = Join-Path $env:GITHUB_WORKSPACE "source\desktop\src-tauri\target\x86_64-pc-windows-msvc\release\bundle"
          if (!(Test-Path $bundleRoot)) {
            throw "Windows bundle output not found: $bundleRoot"
          }
          Get-ChildItem -Path $bundleRoot -File -Recurse | Where-Object {
            $_.Extension -in @(".msi", ".exe", ".zip")
          } | ForEach-Object {
            Copy-Item -Force $_.FullName (Join-Path $dist $_.Name)
          }
          $metadata = [ordered]@{
            source_ref = "${{ inputs.source_ref }}"
            platform = "windows"
            arch = "x64"
            target = "x86_64-pc-windows-msvc"
            created_at = (Get-Date).ToUniversalTime().ToString("o")
          }
          $metadata | ConvertTo-Json | Set-Content -Encoding UTF8 (Join-Path $dist "release.json")
          Get-ChildItem -Path $dist -File | Sort-Object Name | ForEach-Object { Write-Host $_.FullName }

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aidatastudio-windows-${{ inputs.source_ref }}-x64
          path: dist/windows/*
          if-no-files-found: error
          retention-days: 14
