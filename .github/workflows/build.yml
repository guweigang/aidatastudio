name: Build AIData Studio

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "CNB source branch, tag, or commit to build"
        required: true
        default: "main"
      release_mode:
        description: "macOS release mode"
        required: true
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - signed
          - signed-skip-stapling
      target_mode:
        description: "macOS target mode"
        required: true
        default: "apple-silicon"
        type: choice
        options:
          - host
          - apple-silicon
          - intel
          - universal
      publish_github_release:
        description: "Publish artifacts to a GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: aidatastudio-build-${{ github.event.inputs.source_ref }}-${{ github.event.inputs.target_mode }}
  cancel-in-progress: false

env:
  SOURCE_DIR: source
  VJSX_DIR: vjsx
  QUICKJS_DIR: quickjs
  CNB_SOURCE_REPO: ${{ vars.CNB_SOURCE_REPO || 'https://cnb.cool/bullsoft/vtable.git' }}
  VJSX_REPO: ${{ vars.VJSX_REPO || 'https://github.com/guweigang/vjsx.git' }}
  QUICKJS_REPO: ${{ vars.QUICKJS_REPO || 'https://github.com/bellard/quickjs.git' }}
  VTABLE_SIDECAR_V_FLAGS: ${{ vars.VTABLE_SIDECAR_V_FLAGS || '-cc clang -show-c-output -d build_quickjs -d vjsx_mysql -d use_openssl' }}

jobs:
  macos:
    name: macOS DMG
    runs-on: ${{ inputs.target_mode == 'intel' && 'macos-15-intel' || 'macos-14' }}
    timeout-minutes: 90

    steps:
      - name: Checkout CI repository
        uses: actions/checkout@v4

      - name: Prepare CNB authentication
        env:
          CNB_ACCESS_TOKEN: ${{ secrets.CNB_ACCESS_TOKEN }}
        run: |
          set -eu
          if [ -n "${CNB_ACCESS_TOKEN}" ]; then
            git config --global url."https://cnb:${CNB_ACCESS_TOKEN}@cnb.cool/".insteadOf "https://cnb.cool/"
          fi

      - name: Clone source from CNB
        run: |
          set -eu
          git clone --depth 1 --branch "${{ inputs.source_ref }}" "${CNB_SOURCE_REPO}" "${SOURCE_DIR}" || {
            git clone "${CNB_SOURCE_REPO}" "${SOURCE_DIR}"
            cd "${SOURCE_DIR}"
            git checkout "${{ inputs.source_ref }}"
          }

      - name: Clone vjsx from CNB
        run: |
          set -eu
          git clone --depth 1 "${VJSX_REPO}" "${VJSX_DIR}"

      - name: Clone QuickJS
        run: |
          set -eu
          git clone --depth 1 "${QUICKJS_REPO}" "${QUICKJS_DIR}"

      - name: Install system dependencies
        run: |
          set -eu
          brew update
          brew install bdw-gc mysql-client openssl@3 pkg-config sqlite
          mysql_prefix="$(brew --prefix mysql-client)"
          openssl_prefix="$(brew --prefix openssl@3)"
          gc_prefix="$(brew --prefix bdw-gc)"
          sqlite_prefix="$(brew --prefix sqlite)"
          {
            echo "${mysql_prefix}/bin"
            echo "${openssl_prefix}/bin"
            echo "${sqlite_prefix}/bin"
          } >> "${GITHUB_PATH}"
          {
            echo "PKG_CONFIG_PATH=${mysql_prefix}/lib/pkgconfig:${openssl_prefix}/lib/pkgconfig:${gc_prefix}/lib/pkgconfig:${sqlite_prefix}/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "CPPFLAGS=-I${mysql_prefix}/include/mysql -I${openssl_prefix}/include -I${gc_prefix}/include -I${sqlite_prefix}/include ${CPPFLAGS:-}"
            echo "LDFLAGS=-L${mysql_prefix}/lib -L${openssl_prefix}/lib -L${gc_prefix}/lib -L${sqlite_prefix}/lib ${LDFLAGS:-}"
            echo "OPENSSL_ROOT_DIR=${openssl_prefix}"
          } >> "${GITHUB_ENV}"

      - name: Install V
        run: |
          set -eu
          git clone --depth 1 https://github.com/vlang/v.git "${RUNNER_TEMP}/v"
          if ! make -C "${RUNNER_TEMP}/v"; then
            echo "V make failed after bootstrap; checking whether the compiler binary was produced" >&2
            test -x "${RUNNER_TEMP}/v/v"
          fi
          "${RUNNER_TEMP}/v/v" -version
          echo "${RUNNER_TEMP}/v" >> "${GITHUB_PATH}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: source/desktop/package-lock.json

      - name: Install desktop dependencies
        working-directory: source/desktop
        run: npm ci

      - name: Check desktop and Tauri build inputs
        working-directory: source
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}/${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}/${{ env.QUICKJS_DIR }}
        run: |
          set -eu
          npm --prefix desktop run check
          npm --prefix desktop run sidecar:prepare
          npm --prefix desktop run build
          cargo check --manifest-path desktop/src-tauri/Cargo.toml

      - name: Build macOS release
        working-directory: source
        env:
          VTABLE_VJSX_PATH: ${{ github.workspace }}/${{ env.VJSX_DIR }}
          VJS_QUICKJS_PATH: ${{ github.workspace }}/${{ env.QUICKJS_DIR }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          set -eu
          case "${{ inputs.release_mode }}:${{ inputs.target_mode }}" in
            unsigned:host|unsigned:apple-silicon|unsigned:intel)
              npm --prefix desktop run release:macos
              ;;
            unsigned:universal)
              npm --prefix desktop run release:macos:universal
              ;;
            signed:host|signed:apple-silicon|signed:intel)
              npm --prefix desktop run release:macos:signed
              ;;
            signed-skip-stapling:host|signed-skip-stapling:apple-silicon|signed-skip-stapling:intel)
              npm --prefix desktop run release:macos:signed:skip-stapling
              ;;
            *)
              echo "unsupported release/target combination: ${{ inputs.release_mode }}:${{ inputs.target_mode }}" >&2
              exit 1
              ;;
          esac

      - name: Read release metadata
        id: release_meta
        run: |
          set -eu
          version="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.version)")"
          artifact="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.artifact)")"
          arch="$(node -e "const fs=require('fs'); const p='dist/macos/release.json'; const d=JSON.parse(fs.readFileSync(p,'utf8')); process.stdout.write(d.arch)")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "artifact=${artifact}" >> "${GITHUB_OUTPUT}"
          echo "arch=${arch}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aidatastudio-macos-${{ inputs.source_ref }}-${{ inputs.release_mode }}-${{ steps.release_meta.outputs.arch }}
          path: dist/macos/*
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        if: inputs.publish_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: AIData Studio ${{ steps.release_meta.outputs.version }}
          body_path: dist/macos/RELEASE_NOTES.md
          files: |
            dist/macos/${{ steps.release_meta.outputs.artifact }}
            dist/macos/sha256sums.txt
            dist/macos/release.json
          fail_on_unmatched_files: true
